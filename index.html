<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VG TV - Channel Details</title>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --card-border: #334155;
            --accent: #e50914;
            --text: #f8fafc;
            --sub-text: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* --- Navbar & Filters --- */
        .nav { 
            padding: 15px 20px; 
            background: #0b1120; 
            border-bottom: 2px solid var(--accent); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .brand {
            font-size: 20px;
            font-weight: bold;
            color: white;
            margin-right: auto;
        }
        .brand span { color: var(--accent); }

        .filter-group { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap;
        }

        select, input { 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid var(--card-border); 
            background: #000; 
            color: #fff; 
            outline: none; 
            font-size: 14px; 
            cursor: pointer;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(229, 9, 20, 0.4); }

        /* --- Grid Layout --- */
        .grid { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 15px; 
            align-content: start;
        }

        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid var(--card-border); 
            cursor: pointer;
            transition: all 0.2s ease; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { 
            border-color: var(--accent); 
            transform: translateY(-4px); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 70px; 
            height: 70px; 
            object-fit: contain; 
            background: #fff; 
            border-radius: 8px; 
            padding: 5px; 
            margin-bottom: 12px; 
        }

        .card-title { 
            font-size: 14px; 
            font-weight: bold; 
            width: 100%;
            overflow: hidden; 
            white-space: nowrap; 
            text-overflow: ellipsis; 
            margin-bottom: 8px;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 10px;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            color: var(--sub-text);
        }
        .badge.category { border-left: 2px solid var(--accent); }
        .badge.language { border-left: 2px solid #3b82f6; }

        .status-msg { grid-column: 1/-1; text-align: center; color: var(--sub-text); margin-top: 50px; font-size: 16px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* --- MODAL STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .modal-header img {
            width: 60px; height: 60px; object-fit: contain; background: #fff; border-radius: 8px; padding: 4px;
        }
        .modal-header h2 { font-size: 18px; color: #fff; }
        
        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: var(--sub-text); font-size: 28px;
            cursor: pointer; line-height: 1; transition: 0.2s;
        }
        .close-btn:hover { color: var(--accent); }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-box {
            background: #0b1120;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 12px 15px;
        }
        .detail-label {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            display: block;
        }
        .detail-value {
            font-size: 13px;
            color: #e2e8f0;
            font-family: monospace;
            word-break: break-all;
            user-select: all; /* Allows easy 1-click copying */
        }
        .detail-value.scrollable {
            max-height: 80px;
            overflow-y: auto;
        }
        
    </style>
</head>
<body>

    <div class="nav">
        <div class="brand">VG <span>TV</span></div>
        
        <div class="filter-group">
            <input type="text" id="searchInput" placeholder="Search channels...">
            <select id="catFilter">
                <option value="all">All Categories</option>
            </select>
            <select id="langFilter">
                <option value="all">All Languages</option>
            </select>
        </div>
    </div>

    <div id="grid" class="grid">
        <div class="status-msg">Loading channels...</div>
    </div>

    <div id="channelModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <img id="modalImg" src="" alt="Logo">
                <h2 id="modalTitle">Channel Name</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalDetails">
                </div>
        </div>
    </div>

    <script>
        const API_URL = "https://allrounderid.pages.dev/api/jiotv.json";
        
        let allChannels = [];
        
        // DOM Elements
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const catFilter = document.getElementById('catFilter');
        const langFilter = document.getElementById('langFilter');
        const modal = document.getElementById('channelModal');

        // 1. Fetch the Data
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                // Map API data to include ALL required fields for the modal
                allChannels = data.map(c => ({
                    name: c.channel_name || "Unknown Channel",
                    logo: c.channel_logo || "https://via.placeholder.com/70?text=TV",
                    category: c.channel_genre || c.category || "Others",
                    language: c.channel_language || c.language || "Others",
                    url: c.channel_url || "No URL Provided",
                    keyId: c.keyId || "Null",
                    key: c.key || "Null",
                    cookie: c.cookie || "No Cookie Present"
                }));

                // Sort alphabetically
                allChannels.sort((a, b) => a.name.localeCompare(b.name));

                populateFilters();
                renderGrid(allChannels);

            } catch (error) {
                console.error("Fetch error:", error);
                grid.innerHTML = `<div class="status-msg" style="color:red;">Failed to load data. Check internet connection.</div>`;
            }
        }

        // 2. Populate Dropdowns Dynamically
        function populateFilters() {
            const categories = new Set();
            const languages = new Set();

            allChannels.forEach(c => {
                if (c.category) categories.add(c.category);
                if (c.language) languages.add(c.language);
            });

            Array.from(categories).sort().forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                catFilter.appendChild(option);
            });

            Array.from(languages).sort().forEach(lang => {
                const option = document.createElement('option');
                option.value = lang;
                option.textContent = lang;
                langFilter.appendChild(option);
            });
        }

        // 3. Render the Grid
        function renderGrid(channelsToRender) {
            grid.innerHTML = ""; 

            if (channelsToRender.length === 0) {
                grid.innerHTML = `<div class="status-msg">No channels match your filters.</div>`;
                return;
            }

            channelsToRender.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Attach Click Event to open Modal
                card.onclick = () => openModal(c);

                card.innerHTML = `
                    <img src="${c.logo}" alt="logo" loading="lazy" onerror="this.src='https://via.placeholder.com/70?text=TV'">
                    <div class="card-title">${c.name}</div>
                    <div class="card-badges">
                        <span class="badge category">${c.category}</span>
                        <span class="badge language">${c.language}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. Modal Functions
        function openModal(channel) {
            document.getElementById('modalImg').src = channel.logo;
            document.getElementById('modalTitle').innerText = channel.name;

            // CLEAN THE URL: Stop exactly at .mpd (or strip parameters for .m3u8)
            let cleanUrl = channel.url;
            if (cleanUrl && cleanUrl.includes('.mpd')) {
                cleanUrl = cleanUrl.substring(0, cleanUrl.indexOf('.mpd') + 4);
            } else if (cleanUrl && cleanUrl.includes('?')) {
                cleanUrl = cleanUrl.split('?')[0]; // fallback safely removes parameters
            }

            const modalDetails = document.getElementById('modalDetails');
            modalDetails.innerHTML = `
                <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                    <span class="badge category">${channel.category}</span>
                    <span class="badge language">${channel.language}</span>
                </div>
                
                <div class="detail-box">
                    <span class="detail-label">Stream URL</span>
                    <div class="detail-value">${cleanUrl}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Key ID (KID)</span>
                    <div class="detail-value">${channel.keyId}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Key</span>
                    <div class="detail-value">${channel.key}</div>
                </div>

                <div class="detail-box">
                    <span class="detail-label">Auth Cookie</span>
                    <div class="detail-value scrollable">${channel.cookie}</div>
                </div>
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore background scrolling
        }

        // Close modal when clicking outside the box
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 5. Handle Filtering
        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedCat = catFilter.value;
            const selectedLang = langFilter.value;

            const filteredChannels = allChannels.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchTerm);
                const matchesCat = (selectedCat === "all") || (c.category === selectedCat);
                const matchesLang = (selectedLang === "all") || (c.language === selectedLang);
                return matchesSearch && matchesCat && matchesLang;
            });

            renderGrid(filteredChannels);
        }

        searchInput.addEventListener('input', applyFilters);
        catFilter.addEventListener('change', applyFilters);
        langFilter.addEventListener('change', applyFilters);

        // Start App
        loadData();
    </script>
</body>
</html>
